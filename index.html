        // Inicializa o mapa, definindo a visualização inicial [latitude, longitude], e zoom
        // Agora, 'mapa' (no L.map) CORRESPONDE ao ID da DIV 'mapa'
        var mapa = L.map('mapa').setView([52.5200, 13.4050], 11); // Berlim, zoom 13

        // Adiciona o mapa base (OpenStreetMap tiles)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(mapa);
